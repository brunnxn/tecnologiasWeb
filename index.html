<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brunete</title>
    <style>
        :root{--heart-size:320px}
        html,body{height:100%;margin:0}
        body{display:flex;align-items:center;justify-content:center;background:#f3f4f6;font-family:system-ui,Segoe UI,Roboto,'Helvetica Neue',Arial}
        .heart{
            --s:var(--heart-size);
            position:relative;
            width:var(--s);
            height:var(--s);
            background:#ff4b6e;
            transform:rotate(-45deg);
            box-shadow:0 10px 30px rgba(0,0,0,.15);
        }
        .heart::before, .heart::after{
            content:"";
            position:absolute;
            width:var(--s);
            height:var(--s);
            background:#ff4b6e;
            border-radius:50%;
            z-index:0;
        }
        .heart::before{top:calc(-0.5 * var(--s));left:0}
        .heart::after{left:calc(0.5 * var(--s));top:0}
        .heart .content{
            position:absolute;
            inset:0;
            display:flex;
            flex-direction:column;
            align-items:center;
            justify-content:center;
            transform:rotate(45deg);
            color:#fff;
            text-align:center;
            padding:1rem;
            z-index:1;
        }
        .heart h1{font-size:2rem;margin:0}
        .heart h3{font-size:1rem;margin:.5rem 0 0;font-weight:500;opacity:.95}
        @media (max-width:420px){:root{--heart-size:70vmin}.heart h1{font-size:1.4rem}.heart h3{font-size:.9rem}}
    </style>
</head>
<body>
    <div class="heart">
        <div class="content">
            <h1>Vai dar namoro</h1>
            <h3>Bruno + Paulo = amor eterno</h3>
        </div>
    </div>
</body>
</html>
